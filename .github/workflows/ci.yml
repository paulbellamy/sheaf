name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # Typecheck every workspace package (sheaf-server, prototype, plugin).
      - run: pnpm -r typecheck
      # Tests live in sheaf-server (backend, MCP, and the Fastify app).
      - run: pnpm -r test
      # Build the consumers.
      - run: pnpm --filter prototype build
      - run: pnpm --filter sheaf-obsidian build
